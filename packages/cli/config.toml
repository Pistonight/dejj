    ["^ksys::phys::MaterialMaskData::CustomFlag$", "^ksys::phys::MaterialMaskData::CustomFlag::ValueType$"],
    # file: src/KingSystem/Physics/System/physCharacterControllerParam.h
    ["^ksys::phys::NavMeshCharacterType$", "^ksys::phys::NavMeshCharacterType::ValueType$"],
    # file: src/KingSystem/Physics/System/physSystemData.h
    ["^ksys::phys::CharacterControllerTable::Type$", "^ksys::phys::CharacterControllerTable::Type::ValueType$"],

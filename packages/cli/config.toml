[paths]
build-dir = "../../../botw-decomp/build"
elf = "../../../botw-decomp/build/uking"
compdb = "../../../botw-decomp/build/compile_commands.json"
system-header-paths = [
    "../../../botw-decomp/toolchain/clang-4.0.1/include/c++/v1"
]
extract-output = "dejj"

[paths.functions-csv]
path = "../../../botw-decomp/data/uking_functions.csv"
base-address = 0x7100000000
address-column = 0
symbol-column = 3
skip-rows = 1

[paths.data-csv]
path = "../../../botw-decomp/data/data_symbols.csv"
base-address = 0x7100000000
address-column = 0 
symbol-column = 1

[extract]
build-command = ["ninja"]
build-command-inherit-io = false
pointer-width = 64
ptmd-repr = ["u64", 1]
ptmf-repr = ["u64", 2]
char-repr = "u8"
wchar-repr = "u32"
vfptr-field-regex = "^_vptr\\$"
debug.l2mcache = false
debug.lstage = false
debug.mstage = true
debug.hstage = true

[extract.type-parser]
abandon-typedefs = [
    # these may have unparsable consteval expressions in the templates
    "^std::__1::aligned_storage_t",
    "^std::__1::conditional_t",
    "^std::__1::add_pointer_t",
    "^std::__1::remove_reference_t",
    "^std::__1::__optional_sfinae_assign_base_t",
    "^std::__1::__optional_sfinae_ctor_base_t",

    # nn::gfx::InfoType typedefs
    "^InfoType$",

    # uking::Factory conflicts for both Ai factory and Action factory
    "^uking::Factory$",
]

[extract.type-optimizer]
only-keep-referenced-from-symbols = false
pick-union-member = [
    { regex = "^std::__1::string$", members = ["__l", "__s", "__r"], pick = 0 },
    { regex = "^fpos_t$", members = ["__opaque", "__lldata", "__align"], pick = 0 },

    # simplify the PauseMenuDataMgr layout
    { regex = "^uking::ui::PouchItem::Data$", members = ["cook", "weapon"], pick = 0 },
]
enumeratorize = [
    # src/KingSystem/Physics/physDefines.h: ContactLayer
    ["^ksys::phys::ContactLayer$", "^ksys::phys::ContactLayer::ValueType$"],
]
